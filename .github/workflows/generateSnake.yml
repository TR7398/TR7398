name: generate animation
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:

jobs:
  generate_grid_snake:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate_grid_snake
        uses: Platane/snk/svg-only@v3.4.1
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            ./snake_img/snake.svg
            ./snake_img/snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
